<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Alfawares Books</title>
    <link rel="icon" type="image/png" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/icon-512.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
      #installBtn {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        background: #4f46e5;
        color: white;
        padding: 12px 24px;
        border-radius: 9999px;
        font-weight: 900;
        box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        border: none;
        cursor: pointer;
        font-family: system-ui, -apple-system, sans-serif;
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
        40% {transform: translateX(-50%) translateY(-10px);}
        60% {transform: translateX(-50%) translateY(-5px);}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <button id="installBtn">تثبيت التطبيق 📲</button>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');

      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('✅ PWA: beforeinstallprompt event fired');
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';
      });

      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          console.log('🚀 PWA: Triggering install prompt');
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log(`🏠 PWA: User choice outcome: ${outcome}`);
          deferredPrompt = null;
          installBtn.style.display = 'none';
        }
      });

      window.addEventListener('appinstalled', () => {
        console.log('🎉 PWA: App installed successfully');
        installBtn.style.display = 'none';
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ PWA: Service Worker Registered', reg.scope))
            .catch(err => console.error('❌ PWA: Service Worker Error', err));
        });
      }

      // Check if icons are missing and log it
      const checkIcon = (url) => {
        fetch(url, { method: 'HEAD' })
          .then(res => {
            if (!res.ok) console.warn(`⚠️ PWA: Icon missing at ${url}`);
          })
          .catch(() => console.warn(`⚠️ PWA: Could not check icon at ${url}`));
      };
      checkIcon('/icons/icon-512.png');
      checkIcon('/manifest.json');
    </script>
  </body>
</html>
