<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Al-Fawaris English</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Al-Fawaris">
    <meta name="mobile-web-app-capable" content="yes">
    <script>
      // Capture beforeinstallprompt as early as possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        // Prevent the mini-infobar from appearing on mobile
        e.preventDefault();
        // Stash the event so it can be triggered later.
        window.deferredPrompt = e;
        console.log('✅ PWA Install Prompt captured');
        
        // Trigger display immediately when event fires
        if (typeof showPWAInstallBanner === 'function') {
          showPWAInstallBanner();
        }
      });

      // Handle app installed event
      window.addEventListener('appinstalled', (evt) => {
        console.log('✅ App installed successfully');
        const installContainer = document.getElementById('installContainer');
        if (installContainer) installContainer.style.display = 'none';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Professional PWA Install Banner -->
    <div id="installContainer" style="display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.95); backdrop-filter:blur(10px); padding:20px; border-top:1px solid #eee; z-index:99999; flex-direction:column; align-items:center; gap:15px; box-shadow:0 -10px 25px rgba(0,0,0,0.1); border-radius:25px 25px 0 0; animation: slideUp 0.5s ease-out; font-family: 'Inter', sans-serif;">
      <style>
        @keyframes slideUp {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        .install-btn {
          background: linear-gradient(135deg, #000000 0%, #333333 100%);
          color: white;
          border: none;
          padding: 14px 32px;
          border-radius: 16px;
          font-weight: 700;
          font-size: 16px;
          cursor: pointer;
          width: 100%;
          max-width: 300px;
          transition: transform 0.2s, box-shadow 0.2s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 10px;
          box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .install-btn:active {
          transform: scale(0.98);
        }
        .close-btn {
          position: absolute;
          top: 10px;
          right: 15px;
          background: none;
          border: none;
          font-size: 20px;
          color: #999;
          cursor: pointer;
          padding: 5px;
        }
      </style>
      <button class="close-btn" onclick="document.getElementById('installContainer').style.display='none'">✕</button>
      <div style="display:flex; align-items:center; gap:12px; width:100%; max-width:300px;">
        <img src="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png" style="width:48px; height:48px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.1);" alt="Logo">
        <div style="flex:1;">
          <div style="font-weight:800; font-size:16px; color:#000;">Al-Fawaris English</div>
          <div style="font-size:12px; color:#666;">ثبت التطبيق للوصول السريع</div>
        </div>
      </div>
      <button id="installBtn" class="install-btn">
        تثبيت التطبيق • Install
      </button>
      <div id="iosInstruction" style="display:none; font-size:13px; color:#444; text-align:center; direction:rtl; line-height:1.5;">
        للتثبيت على آيفون: اضغط على أيقونة المشاركة <span style="font-size:18px; vertical-align:middle;">⎋</span> ثم اختر <b>"إضافة إلى الشاشة الرئيسية"</b>
      </div>
      <div id="androidManualInstruction" style="display:none; font-size:13px; color:#444; text-align:center; direction:rtl; line-height:1.5;">
        للتثبيت: اضغط على النقاط الثلاث <span style="font-size:18px; vertical-align:middle;">⋮</span> في المتصفح ثم اختر <b>"تثبيت التطبيق"</b>
      </div>
    </div>

    <script>
      function showPWAInstallBanner() {
        const installContainer = document.getElementById('installContainer');
        const installBtn = document.getElementById('installBtn');
        const iosInstruction = document.getElementById('iosInstruction');
        const androidManualInstruction = document.getElementById('androidManualInstruction');

        // Check if already installed
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) {
          installContainer.style.display = 'none';
          return;
        }

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if (isIOS) {
          installContainer.style.display = 'flex';
          iosInstruction.style.display = 'block';
          installBtn.style.display = 'none';
          androidManualInstruction.style.display = 'none';
        } else {
          installContainer.style.display = 'flex';
          iosInstruction.style.display = 'none';
          if (window.deferredPrompt) {
            installBtn.style.display = 'flex';
            androidManualInstruction.style.display = 'none';
          } else {
            // Fallback if browser is slow to fire the event
            installBtn.style.display = 'none';
            androidManualInstruction.style.display = 'block';
          }
        }
      }

      // Force show after 1 second regardless of events to ensure visibility
      setTimeout(showPWAInstallBanner, 1000);

      // Re-check every 3 seconds if not installed and prompt not yet available
      const checkInterval = setInterval(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) {
          clearInterval(checkInterval);
          return;
        }
        if (window.deferredPrompt) {
          showPWAInstallBanner();
          clearInterval(checkInterval);
        }
      }, 3000);

      document.getElementById('installBtn').addEventListener('click', async () => {
        if (window.deferredPrompt) {
          window.deferredPrompt.prompt();
          const { outcome } = await window.deferredPrompt.userChoice;
          console.log(`User response to the install prompt: ${outcome}`);
          window.deferredPrompt = null;
          document.getElementById('installContainer').style.display = 'none';
        }
      });
    </script>
  </body>
</html>
