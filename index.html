<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Al-Fawaris English</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png" />
    <meta name="theme-color" content="#000000">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <button id="installBtn" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;background-color:#000000;color:white;border:none;padding:12px 24px;border-radius:50px;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.4);cursor:pointer;font-family:sans-serif;">
      تثبيت التطبيق • Install App
    </button>

    <script>
      let deferredPrompt;
      const installBtn = document.getElementById('installBtn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('✅ PWA Install Prompt ready');
        installBtn.style.display = 'block';
      });

      installBtn.addEventListener('click', () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted the install prompt');
            } else {
              console.log('User dismissed the install prompt');
            }
            deferredPrompt = null;
            installBtn.style.display = 'none';
          });
        }
      });

      window.addEventListener('appinstalled', (evt) => {
        console.log('✅ App installed successfully');
        installBtn.style.display = 'none';
      });
    </script>
  </body>
</html>
