<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>Al-Fawaris English</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/ZzDyvmt0/1769711064-removebg-preview.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Al-Fawaris">
    <meta name="mobile-web-app-capable" content="yes">
    <script>
      // Capture beforeinstallprompt as early as possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        console.log('✅ PWA Install Prompt captured');
        // If the UI is already loaded, show the button
        const btn = document.getElementById('installBtn');
        const container = document.getElementById('installContainer');
        if (btn && container) {
          container.style.display = 'flex';
          btn.style.display = 'flex';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <div id="installContainer" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;flex-direction:column;align-items:flex-end;gap:10px;">
      <button id="installBtn" style="background-color:#000000;color:white;border:none;padding:12px 24px;border-radius:50px;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.4);cursor:pointer;font-family:sans-serif;display:flex;align-items:center;gap:8px;">
        تثبيت التطبيق • Install App
      </button>
      <div id="iosInstruction" style="display:none;background-color:white;color:#333;padding:10px 15px;border-radius:15px;font-size:12px;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.1);border:1px solid #eee;max-width:200px;text-align:center;direction:rtl;">
        للتثبيت على آيفون: اضغط على <span style="font-size:16px;">⎋</span> ثم "إضافة إلى الشاشة الرئيسية"
      </div>
    </div>

    <script>
      const installContainer = document.getElementById('installContainer');
      const installBtn = document.getElementById('installBtn');
      const iosInstruction = document.getElementById('iosInstruction');

      // Check if already installed
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      
      if (!isStandalone) {
        // Show iOS instruction if on iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (isIOS) {
          installContainer.style.display = 'flex';
          iosInstruction.style.display = 'block';
          installBtn.style.display = 'none';
        }

        // If the prompt was already captured, show the button
        if (window.deferredPrompt) {
          installContainer.style.display = 'flex';
          installBtn.style.display = 'flex';
        }

        installBtn.addEventListener('click', () => {
          if (window.deferredPrompt) {
            window.deferredPrompt.prompt();
            window.deferredPrompt.userChoice.then((choiceResult) => {
              if (choiceResult.outcome === 'accepted') {
                console.log('User accepted the install prompt');
                installContainer.style.display = 'none';
              }
              window.deferredPrompt = null;
            });
          }
        });

        window.addEventListener('appinstalled', (evt) => {
          console.log('✅ App installed successfully');
          installContainer.style.display = 'none';
        });
      }
    </script>
  </body>
</html>
